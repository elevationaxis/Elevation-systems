databases:
  - name: elevation-axis-db
    plan: free
    databaseName: elevation_axis
    user: elevation_axis_user

services:
  - type: web
    name: elevation-axis
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npx tsx script/build.ts && npx drizzle-kit push
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: elevation-axis-db
          property: connectionString
